sentence=A high-performance C++ PID controller with Åström-Hägglund relay feedback auto-tuning.
paragraph=This library implements a production-ready C++ PID controller featuring Åström-Hägglund relay auto-tuning, Ziegler-Nichols tuning rules, integral anti-windup (dynamic clamping), derivative on measurement (derivative kick prevention), bumpless manual-to-auto transfer, and forward/reverse acting modes. Suitable for Arduino, ESP8266, ESP32, and STM32.
